<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Joel ❤️</title>
    <style>
        body { background-color: #FDFBF7; font-family: 'Georgia', serif; text-align: center; padding: 20px; color: #2C2C2C; }
        .contenedor { max-width: 400px; margin: 0 auto; }
        h1 { color: #8B1E22; font-size: 1.5rem; margin-top: 20px; }
        .hilo-img { width: 100%; max-width: 300px; border-radius: 15px; margin: 20px 0; cursor: pointer; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Para la persona que cambió mi vida...</h1>
        <p>Una leyenda japonesa dice que estamos unidos por un hilo rojo invisible.</p>
        
        <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=500" 
             class="hilo-img" onclick="iniciarSorpresa()" alt="Toca aquí">
        <p>Toca el hilo rojo para empezar ❤️</p>

        <audio id="musica-piano" src="piano-intro.mp3.m4a" autoplay></audio>
        <audio id="musica-admv" src="Maluma_-_ADMV_(mp3.pm).mp3"></audio>
    </div>

    <script>
        function iniciarSorpresa() {
            document.getElementById('musica-piano').pause();
            document.getElementById('musica-admv').play();
            alert("¡Sorpresa! El hilo rojo nos ha unido.");
        }
    </script>
</body>
</html>
