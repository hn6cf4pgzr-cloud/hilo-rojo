<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Joel ❤️</title>
    <style>
        body { background-color: #FDFBF7; font-family: 'Georgia', serif; text-align: center; padding: 20px; color: #2C2C2C; }
        .corazon { display: inline-block; animation: latido 1.5s infinite; font-size: 1.5rem; }
        @keyframes latido { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .flotante { animation: flotar 3s infinite; }
        @keyframes flotar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .boton-inicio { background-color: #8B1E22; color: white; padding: 20px 30px; border: none; border-radius: 50px; font-size: 1.3rem; cursor: pointer; box-shadow: 0 4px 15px rgba(139,30,34,0.3); }
        .foto { width: 90%; max-width: 350px; border-radius: 20px; margin: 15px auto; display: block; border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .flecha { font-size: 2rem; animation: parpadeo 1s infinite; }
        @keyframes parpadeo { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #seccion-sorpresa, #zona-fotos { display: none; }
    </style>
</head>
<body>
    <div style="max-width: 400px; margin: 0 auto;">
        <h1><span class="corazon">❤️</span> Para ti, Joel <span class="corazon">❤️</span></h1>
        <button class="boton-inicio" onclick="comenzarMusica()">¡Presiona aquí para escuchar mi sorpresa! 🎹</button>
        
        <div id="seccion-sorpresa">
            <img src="IMG_9698.jpeg" class="foto">
            <h2 class="flotante">Mirelly & Joel</h2>
            <p>Una leyenda dice que estamos unidos por un hilo rojo invisible... <span class="corazon">❤️</span></p>
            <div class="flecha">⬇️</div>
            <p>Desliza para descubrir nuestra historia...</p>
            <hr>
            <p>Toca el hilo rojo para continuar nuestra melodía:</p>
            <div style="font-size: 4rem; cursor: pointer;" onclick="iniciarSorpresa()">🧶✨</div>
            
            <div id="zona-fotos">
                <img src="IMG_3241.jpeg" class="foto"><img src="IMG_3324.jpeg" class="foto">
                <img src="IMG_3431.jpeg" class="foto"><img src="IMG_3511.jpeg" class="foto">
                <img src="IMG_3545.jpeg" class="foto"><img src="IMG_3556.jpeg" class="foto">
                <img src="IMG_3669.jpeg" class="foto"><img src="IMG_3746.jpeg" class="foto">
                <img src="IMG_3801.jpeg" class="foto"><img src="IMG_9698.jpeg" class="foto">
                <img src="temp_image_03A038E1-E82B-4BE9-AE35-9610C35B9A45.jpeg" class="foto">
                <img src="temp_image_299E5277-A313-4BA3-B244-C597D861A703.jpeg" class="foto">
                <img src="temp_image_53C000E4-6882-4501-B9E4-D4C53556D869.jpeg" class="foto">
                <img src="temp_image_6B815619-CE92-43FC-823E-160B5B1123D6.jpeg" class="foto">
                <img src="temp_image_774D0D17-9D69-42B5-AB2E-2DE79237F026.jpeg" class="foto">
                <img src="IMG_9698.jpeg" class="foto">
            </div>
        </div>
        <audio id="musica-piano" src="piano-intro.mp3.m4a"></audio>
        <audio id="musica-admv" src="Maluma_-_ADMV_(mp3.pm).mp3"></audio>
    </div>

    <script>
        function comenzarMusica() {
            document.getElementById('musica-piano').play();
            document.getElementById('seccion-sorpresa').style.display = 'block';
            document.querySelector('.boton-inicio').style.display = 'none';
        }
        function iniciarSorpresa() {
            document.getElementById('musica-piano').pause();
            document.getElementById('musica-admv').play();
            document.getElementById('zona-fotos').style.display = 'block';
        }
    </script>
</body>
</html>
